<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Society Z — Connect wallet</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0b0d10; color: #e8eaed; padding: 24px;
    }
    main { max-width: 560px; width: 100%; }
    h1 { font-size: 1.5rem; margin: 0 0 .25rem; letter-spacing: -0.01em; }
    .card { background: #14171b; border: 1px solid #23272d; border-radius: 14px; padding: 28px; }
    .who { color: #aab1b8; margin: 0 0 1.25rem; }
    .who b { color: #e8eaed; }
    button {
      font: inherit; font-weight: 600; cursor: pointer; border-radius: 10px;
      padding: 12px 18px; border: 1px solid #2ea043; background: #238636; color: #fff;
      margin: .25rem .5rem .25rem 0;
    }
    button:hover { background: #2ea043; }
    button:disabled { opacity: .5; cursor: default; }
    button.ghost { background: transparent; border-color: #30363d; color: #e8eaed; }
    .row { display: flex; flex-wrap: wrap; gap: .25rem; }
    .status { margin-top: 1.25rem; padding: 12px 14px; border-radius: 10px; font-size: .92rem; word-break: break-word; }
    .status.ok { background: #0f2417; border: 1px solid #1f6f3f; color: #9be6b4; }
    .status.err { background: #2a1315; border: 1px solid #7a2b2f; color: #f0a9ac; }
    .status.info { background: #16202b; border: 1px solid #274156; color: #9fc6e6; }
    code { background: #1d2126; padding: 1px 6px; border-radius: 5px; word-break: break-all; }
    a { color: #6cb6ff; }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>Connect your wallet</h1>
      <p class="who">Signed in as <b id="login">…</b>. This wallet will be bound to that GitHub account.</p>
      <div class="row">
        <button id="phantom">Connect Phantom</button>
        <button id="solflare" class="ghost">Connect Solflare</button>
      </div>
      <div id="status" class="status info" style="display:none"></div>
      <p style="margin-top:1.25rem"><a href="/">← back</a></p>
    </div>
  </main>

  <script>
    // ---- session (server-verified identity; never trusted from the client) ----
    let SESSION = null; // { id, login, domain }

    const $ = (id) => document.getElementById(id);
    function show(kind, html) {
      const el = $("status");
      el.className = "status " + kind;
      el.style.display = "block";
      el.innerHTML = html;
    }

    // ---- base58 encode (Bitcoin/Solana alphabet), matches ../linking/crypto.mjs bs58encode ----
    const B58 = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
    function bs58encode(bytes) {
      bytes = Uint8Array.from(bytes);
      if (bytes.length === 0) return "";
      const digits = [0];
      for (let i = 0; i < bytes.length; i++) {
        let carry = bytes[i];
        for (let j = 0; j < digits.length; j++) {
          carry += digits[j] << 8;
          digits[j] = carry % 58;
          carry = (carry / 58) | 0;
        }
        while (carry > 0) { digits.push(carry % 58); carry = (carry / 58) | 0; }
      }
      let out = "";
      for (let i = 0; i < bytes.length && bytes[i] === 0; i++) out += "1";
      for (let i = digits.length - 1; i >= 0; i--) out += B58[digits[i]];
      return out;
    }

    // ---- SIWS message builder — MUST stay byte-for-byte identical to ../linking/siws.mjs
    //      buildSiwsMessage(). The ed25519 signature is over these exact bytes; any drift here
    //      makes every signature fail verification server-side. github_id is the SESSION id. ----
    const CHAIN_ID = "solana:mainnet";
    const VERSION = "1";
    function buildSiwsMessage({ domain, uri, wallet, github_login, github_id, nonce, issuedAt, expirationTime }) {
      return [
        `${domain} wants you to sign in with your Solana account:`,
        `${wallet}`,
        ``,
        `Link this wallet to GitHub @${github_login} (id ${github_id}) for Society Z contribution.`,
        ``,
        `URI: ${uri}`,
        `Version: ${VERSION}`,
        `Chain ID: ${CHAIN_ID}`,
        `Nonce: ${nonce}`,
        `Issued At: ${issuedAt}`,
        `Expiration Time: ${expirationTime}`,
      ].join("\n");
    }

    async function loadSession() {
      const r = await fetch("/api/session", { credentials: "same-origin" });
      if (!r.ok) { window.location.href = "/"; return; }
      SESSION = await r.json();
      $("login").textContent = "@" + SESSION.login;
    }

    function getProvider(kind) {
      if (kind === "phantom") return window.phantom?.solana || (window.solana?.isPhantom ? window.solana : null);
      if (kind === "solflare") return window.solflare || (window.solana?.isSolflare ? window.solana : null);
      return null;
    }

    async function linkWith(kind) {
      try {
        const provider = getProvider(kind) || window.solana;
        if (!provider) { show("err", `No ${kind} wallet detected. Install the extension and reload.`); return; }

        show("info", "Connecting wallet…");
        await provider.connect();
        const wallet = (provider.publicKey?.toBase58?.() || provider.publicKey?.toString?.());
        if (!wallet) { show("err", "Could not read wallet public key."); return; }

        // Server-issued, single-use nonce from the REAL linking nonce store.
        const nonceRes = await fetch("/api/nonce", { credentials: "same-origin" });
        if (!nonceRes.ok) { show("err", "Could not get a nonce. Session may have expired — reload."); return; }
        const { nonce } = await nonceRes.json();

        const now = Date.now();
        const message = buildSiwsMessage({
          domain: SESSION.domain,
          uri: `https://${SESSION.domain}`,
          wallet,
          github_login: SESSION.login,
          github_id: SESSION.id,           // authoritative id from the verified session
          nonce,
          issuedAt: new Date(now).toISOString(),
          expirationTime: new Date(now + 10 * 60 * 1000).toISOString(),
        });

        show("info", "Approve the signature request in your wallet…");
        const encoded = new TextEncoder().encode(message);
        const signed = await provider.signMessage(encoded, "utf8");
        // Phantom returns { signature: Uint8Array }; some wallets return the Uint8Array directly.
        const sigBytes = signed?.signature ?? signed;
        const siws_signature = bs58encode(sigBytes);

        show("info", "Verifying and recording your link…");
        const linkRes = await fetch("/api/link", {
          method: "POST",
          credentials: "same-origin",
          headers: { "content-type": "application/json" },
          // NOTE: we do NOT send github_id — the server takes it from the session. Sending it
          // would be ignored anyway.
          body: JSON.stringify({ wallet, siws_message: message, siws_signature }),
        });
        const out = await linkRes.json();
        if (out.ok) {
          show("ok", `Linked. Wallet <code>${wallet}</code> is now bound to @${SESSION.login}. Your PRs can be gated.`);
        } else {
          show("err", `Link failed: <code>${out.code || out.error || "unknown"}</code> ${out.detail ? "— " + out.detail : ""}`);
        }
      } catch (e) {
        show("err", "Wallet error: " + (e?.message || String(e)));
      }
    }

    $("phantom").addEventListener("click", () => linkWith("phantom"));
    $("solflare").addEventListener("click", () => linkWith("solflare"));
    loadSession();
  </script>
</body>
</html>
